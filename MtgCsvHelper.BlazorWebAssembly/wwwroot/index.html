<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MtG Csv Helper</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MtgCsvHelper.BlazorWebAssembly.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
        <p id="loading-status" style="text-align:center; color:#666; display:none;">Initializing runtime&hellip;</p>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <div id="sw-update-banner"
         style="display:none; position:fixed; bottom:0; left:0; right:0; padding:10px 16px; background:#0d6efd; color:white; text-align:center; z-index:9999; box-shadow:0 -2px 6px rgba(0,0,0,.25)">
        A new version is available.
        <button onclick="applyUpdate()" class="btn btn-light btn-sm" style="margin-left:12px;">Reload to update</button>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
	<script>
		window.downloadFileFromStream = async (fileName, contentStreamReference) => {
			const arrayBuffer = await contentStreamReference.arrayBuffer();
			const blob = new Blob([arrayBuffer]);
			const url = URL.createObjectURL(blob);
			const anchorElement = document.createElement('a');
			anchorElement.href = url;
			anchorElement.download = fileName ?? '';
			anchorElement.click();
			anchorElement.remove();
			URL.revokeObjectURL(url);
		}
	</script>
    <script>
        // Once the download circle hits 100%, show a status message below it
        // so users know the runtime is still starting up (not frozen)
        (function () {
            var watcher = setInterval(function () {
                var pct = getComputedStyle(document.documentElement)
                    .getPropertyValue('--blazor-load-percentage').trim();
                if (pct === '100%') {
                    clearInterval(watcher);
                    document.getElementById('loading-status').style.display = 'block';
                }
            }, 100);
        })();

        navigator.serviceWorker.register('service-worker.js');

        // Show a reload banner when a new version of the app is available
        let _pendingWorker = null;

        function showUpdateBanner(worker) {
            _pendingWorker = worker;
            document.getElementById('sw-update-banner').style.display = 'block';
        }

        function applyUpdate() {
            if (_pendingWorker) _pendingWorker.postMessage({ type: 'SKIP_WAITING' });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(reg => {
                if (reg.waiting) showUpdateBanner(reg.waiting);
                reg.addEventListener('updatefound', () => {
                    const sw = reg.installing;
                    sw.addEventListener('statechange', () => {
                        if (sw.state === 'installed' && navigator.serviceWorker.controller)
                            showUpdateBanner(sw);
                    });
                });
            });
            // Reload once the new SW takes control so the fresh version is served
            navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
        }
    </script>
    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "1ce2f45a4c6543518451a38d162b3b6d"}'></script>
    <!-- End Cloudflare Web Analytics -->
</body>

</html>
