<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MtG Csv Helper</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
        <p style="text-align:center; color:#666;">Loading app&hellip;</p>
    </div>

    <div id="blazor-error-ui">
        An unexpected error occurred. Open DevTools (F12) → Console for details.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <div id="sw-update-banner"
         style="display:none; position:fixed; bottom:0; left:0; right:0; padding:10px 16px; background:#0d6efd; color:white; text-align:center; z-index:9999; box-shadow:0 -2px 6px rgba(0,0,0,.25)">
        A new version is available.
        <button onclick="applyUpdate()" class="btn btn-light btn-sm" style="margin-left:12px;">Reload to update</button>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        window.downloadFileFromStream = async (fileName, contentStreamReference) => {
            const arrayBuffer = await contentStreamReference.arrayBuffer();
            const blob = new Blob([arrayBuffer]);
            const url = URL.createObjectURL(blob);
            const anchorElement = document.createElement('a');
            anchorElement.href = url;
            anchorElement.download = fileName ?? '';
            anchorElement.click();
            anchorElement.remove();
            URL.revokeObjectURL(url);
        }

        // Skip SW registration on localhost — dev rebuilds caused a controllerchange
        // reload loop (new SW installs each build → page reloads → app boots into the
        // same situation). The PWA / offline behavior only matters in production anyway.
        const _isLocalDev = ['localhost', '127.0.0.1', '[::1]'].includes(location.hostname);

        // Show a reload banner when a new version of the app is available
        let _pendingWorker = null;

        function showUpdateBanner(worker) {
            _pendingWorker = worker;
            document.getElementById('sw-update-banner').style.display = 'block';
        }

        function applyUpdate() {
            if (_pendingWorker) _pendingWorker.postMessage({ type: 'SKIP_WAITING' });
        }

        if ('serviceWorker' in navigator && !_isLocalDev) {
            navigator.serviceWorker.register('service-worker.js');
            navigator.serviceWorker.ready.then(reg => {
                if (reg.waiting) showUpdateBanner(reg.waiting);
                reg.addEventListener('updatefound', () => {
                    const sw = reg.installing;
                    sw.addEventListener('statechange', () => {
                        if (sw.state === 'installed' && navigator.serviceWorker.controller)
                            showUpdateBanner(sw);
                    });
                });
            });
            // Reload once when the new SW takes control. Guard against loops in case
            // a build keeps producing a new SW hash (controllerchange would fire again
            // after the reload).
            let _refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (_refreshing) return;
                _refreshing = true;
                location.reload();
            });
        } else if (_isLocalDev && 'serviceWorker' in navigator) {
            // Make sure no stale SW from prior runs keeps controlling the localhost dev page.
            navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }
    </script>
    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "1ce2f45a4c6543518451a38d162b3b6d"}'></script>
    <!-- End Cloudflare Web Analytics -->
</body>

</html>
