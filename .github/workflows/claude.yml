name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-interactive:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  claude-auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Enabled for debug visibility while auto-review reliability is being verified.
          # Safe for our review prompts: no secrets in the input. Disable once auto-review is reliably commenting.
          show_full_output: true
          # Inject the PR number explicitly. Without this the agent intermittently can't infer
          # which PR to review and falls back to AskUserQuestion, which terminates silently in CI.
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} on ${{ github.repository }}.

            Fetch the diff with: gh pr diff ${{ github.event.pull_request.number }}
            Fetch metadata with: gh pr view ${{ github.event.pull_request.number }}

            Review for:
            - Code quality and .NET best practices
            - Potential bugs or issues
            - Security implications
            - Test coverage

            Use inline comments for specific issues. ${{ github.event.action == 'opened' && 'Add a single summary comment with the overall assessment.' || 'Do NOT post a summary / overall-assessment comment — this is a re-review on push and the initial review already has one; another summary would duplicate it. Focus on issues introduced by the new commits.' }}
            You are running in CI with no interactive user — never call AskUserQuestion. If a
            tool you need is not allowed, post a single comment via `gh pr comment` explaining
            what's blocked, then stop.
          # gh api is allowed because the agent occasionally needs it to post review-level
          # summary comments (the create_inline_comment MCP tool only handles inline). Without
          # this the agent falls back to AskUserQuestion asking permission to call gh api,
          # which terminates silently in CI. Disallowing AskUserQuestion explicitly is the
          # belt-and-suspenders fix.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)"
            --disallowedTools "AskUserQuestion"
